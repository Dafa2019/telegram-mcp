# =============================================================================
# Auto PR Review Workflow
# 适用仓库: Dafa2019/telegram-mcp
#
# 功能:
#   - 自动审查 PR（跳过 repo owner Dafa2019 的 PR）
#   - 检测二进制文件、锁文件冲突、空描述、大型变更、治理文件等
#   - 低风险自动批准 + 添加 boss-approved 标签
#   - 发现问题自动 request changes
#   - 高风险通过 Slack 通知 Boss
# =============================================================================

name: Auto PR Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  auto-review:
    runs-on: ubuntu-latest
    # 跳过 repo owner 的 PR
    if: github.event.pull_request.user.login != 'Dafa2019'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup review script
        run: |
          cp .github/scripts/auto-review.sh /tmp/auto-review.sh
          chmod +x /tmp/auto-review.sh

      - name: Run automated PR review
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_OPS_ALERTS }}
          TEMBO_API_KEY: ${{ secrets.TEMBO_API_KEY }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          REPO_FULL_NAME: ${{ github.repository }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: /tmp/auto-review.sh
